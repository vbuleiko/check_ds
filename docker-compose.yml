services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite:////app/data/check_ds.db
      # 7z на Linux после установки p7zip-full
      SEVENZIP_PATH: /usr/bin/7z
      # EXTERNAL_DB_URL берётся из .env
    volumes:
      # SQLite — папка с БД (монтировать папку, не файл — иначе Docker ломает на Windows)
      - ./data:/app/data
      # Загруженные архивы
      - ./uploads:/app/uploads
      # Старые данные для импорта
      - ./old:/app/old
    extra_hosts:
      - "supper-01:192.168.0.189"
    restart: unless-stopped
